<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
    <h2>Reset Password</h2>

    <form id="resetForm">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" required>

        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password" required>

        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>

        <button type="submit">Reset Password</button>
        <p id="resetError" style="color:red; margin-top:5px;"></p>
        <p id="resetSuccess" style="color:green; margin-top:5px;"></p>
    </form>
</div>

<script>
document.getElementById("resetForm").addEventListener("submit", function(e){
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const newPassword = document.getElementById("newPassword").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if(newPassword !== confirmPassword){
        document.getElementById("resetError").innerText = "Passwords do not match!";
        return;
    }

    let users = JSON.parse(localStorage.getItem("systemUsers")) || [];
    const userIndex = users.findIndex(u => u.username === username);

    if(userIndex === -1){
        document.getElementById("resetError").innerText = "Username not found!";
        return;
    }

    // تحديث كلمة المرور
    users[userIndex].password = newPassword;
    localStorage.setItem("systemUsers", JSON.stringify(users));

    document.getElementById("resetSuccess").innerText = "Password updated! Go back to login.";
    document.getElementById("resetError").innerText = "";

    // يمكن إضافة تحويل تلقائي للصفحة بعد ثانيتين
    setTimeout(() => {
        window.location.href = "login.html";
    }, 2000);
});
</script>
</body>
</html>
