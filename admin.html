<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Reservation System</title>
<!-- <link rel="stylesheet" href="dashboard.css"> -->
</head>

<body>

<header class="topbar">

<div class="logo">
🚆 Train Reservation System
<p id="roleText"></p>
</div>

<button id="logoutBtn">Logout</button>

</header>


<nav class="tabs">

<button class="tab active" data-tab="reservations">
Reservations
</button>

<button class="tab" data-tab="passengers">
Passengers
</button>

<button class="tab" data-tab="trains">
Trains
</button>

</nav>



<!-- Reservations -->

<section id="reservations" class="content active">

<div class="sectionHeader">
<h2>Reservations</h2>

<button id="addReservation">Add Reservation</button>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Passenger</th>
<th>Train</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="reservationTable">

<tr>
<td colspan="5">No reservations yet</td>
</tr>

</tbody>

</table>

</section>



<!-- Passengers -->

<section id="passengers" class="content">

<div class="sectionHeader">
<h2>Passengers</h2>

<button id="addPassenger">Add Passenger</button>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="passengerTable">

<tr>
<td colspan="4">No passengers added</td>
</tr>

</tbody>

</table>

</section>



<!-- Trains -->

<section id="trains" class="content">

<div class="sectionHeader">
<h2>Train Management</h2>

<button id="addTrain">Add Train</button>
</div>

<table>

<thead>

<tr>
<th>Train ID</th>
<th>Name</th>
<th>Route</th>
<th>Total Seats</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="trainTable">

<tr>
<td colspan="6">No trains added yet</td>
</tr>

</tbody>

</table>

</section>

<style>body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:15px 40px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-size:20px;
font-weight:bold;
}

.tabs{
display:flex;
justify-content:center;
margin:20px;
gap:10px;
}

.tab{
padding:10px 20px;
border:none;
background:#ddd;
border-radius:20px;
cursor:pointer;
}

.tab.active{
background:#0b1c3f;
color:white;
}

.content{
display:none;
width:80%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.content.active{
display:block;
}

.sectionHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

button{
background:#0b1c3f;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}</style>
<script>const role = localStorage.getItem("role")

const roleText = document.getElementById("roleText")

roleText.innerText = "Logged in as: " + role



// logout

document.getElementById("logoutBtn").onclick = function(){

localStorage.clear()

window.location.href="login.html"

}



// Tabs

const tabs = document.querySelectorAll(".tab")

const contents = document.querySelectorAll(".content")

tabs.forEach(tab => {

tab.onclick = () => {

tabs.forEach(t=>t.classList.remove("active"))

contents.forEach(c=>c.classList.remove("active"))

tab.classList.add("active")

document.getElementById(tab.dataset.tab).classList.add("active")

}

})



// Role permissions

if(role === "staff"){

document.getElementById("addPassenger").style.display="none"

document.getElementById("addTrain").style.display="none"

}



// Demo add buttons

document.getElementById("addTrain").onclick = function(){

alert("Train Added")

}

document.getElementById("addPassenger").onclick = function(){

alert("Passenger Added")

}

document.getElementById("addReservation").onclick = function(){

alert("Reservation Added")

}</script>
<script src="dashboard.js"></script>

</body>
</html>
