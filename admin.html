<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Reservation System - Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin: 20px;
            gap: 10px;
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: #ddd;
            border-radius: 20px;
            cursor: pointer;
        }

        .tab.active {
            background: #0b1c3f;
            color: white;
        }

        .content {
            display: none;
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .content.active {
            display: block;
        }

        .sectionHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        button {
            background: #0b1c3f;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        /* Modal Styles */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-box input {
            width: 90%;
            margin: 10px 0;
            border-radius: 30px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="logo">
        🚆 Train Reservation System
        <p id="roleText" style="font-size: 12px; color: gray; margin: 0;"></p>
    </div>
    <button id="logoutBtn">Logout</button>
</header>

<nav class="tabs">
    <button class="tab active" data-tab="reservations">Reservations</button>
    <button class="tab" data-tab="passengers">Passengers</button>

</nav>

    <div class="sectionHeader">
        <h2>Reservations</h2>
        <button id="addReservation">Add Reservation</button>

    <table>
        <thead>
            <tr><th>ID</th><th>Passenger</th><th>Train</th><th>Date</th><th>Actions</th></tr>
        </thead>
        <tbody id="reservationTable"></tbody>
    </table>
</section>

<section id="passengers" class="content">
    <div class="sectionHeader">
        <h2>Passengers</h2>
        <button id="addPassenger">Add Passenger</button>
    </div>
    <table>
        <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr>
        </thead>
        <tbody id="passengerTable"></tbody>
    </table>
</section>

<section id="trains" class="content">
    <div class="sectionHeader">
        <h2>Train Management</h2>
        <button id="addTrain">Add Train</button>
    </div>
    <table>
        <thead>
            <tr><th>Train ID</th><th>Name</th><th>Route</th><th>Seats</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="trainTable"></tbody>
    </table>
</section>
