<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Reservation System - Admin</title>
    <script>
    // 1. Check if the user has a role
    const userRole = localStorage.getItem("role");

    // 2. ONLY redirect if there is NO role AND we aren't already on the login page
    if (!userRole && !window.location.href.includes("login.html")) {
        window.location.href = "login.html";
    }
</script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin: 20px;
            gap: 10px;
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: #ddd;
            border-radius: 20px;
            cursor: pointer;
        }

        .tab.active {
            background: #0b1c3f;
            color: white;
        }

        .content {
            display: none;
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .content.active {
            display: block;
        }

        .sectionHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        button {
            background: #0b1c3f;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        /* Modal Styles */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-box input {
            width: 90%;
            margin: 10px 0;
            border-radius: 30px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="logo" style="display: flex; align-items: center; gap: 10px;">
        <img src="images/f7dc4aac-6a9c-42e3-b3f6-56ec23995dcf-removebg-preview.png" 
             alt="Logo" 
             style="width: 30px; height: 30px; border-radius: 50%; object-fit: contain;
             border: 2px solid #0b1c3f">
        
        <div>
            <span style="display: block; font-weight: bold;">Train Reservation System</span>
            <p id="roleText" style="font-size: 12px; color: gray; margin: 0;"></p>
        </div>
    </div>
    <button id="logoutBtn">Logout</button>
</header>
<nav class="tabs">
    <button class="tab active" data-tab="reservations">Reservations</button>
    <button class="tab" data-tab="passengers">Passengers</button>
    <button class="tab" data-tab="trains">Trains</button>
</nav>

<section id="reservations" class="content active">
    <div class="sectionHeader">
        <h2>Reservations</h2>
        <button id="addReservation">Add Reservation</button>
    </div>
    <table>
        <thead>
            <thead>
    <tr>
        <th>Reservation ID</th>
        <th>Passenger</th>
        <th>Train</th>
        <th>Date</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
</thead>
        </thead>
        <tbody id="reservationTable"></tbody>
    </table>
</section>

<section id="passengers" class="content">
    <div class="sectionHeader">
        <h2>Passengers</h2>
        <button id="addPassenger">Add Passenger</button>
    </div>
    <table>
        <thead>
<tr>
    <th>Passenger ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Actions</th>
</tr>
        </thead>
        <tbody id="passengerTable"></tbody>
    </table>
</section>

<section id="trains" class="content">
    <div class="sectionHeader">
        <h2>Train Management</h2>
        <button id="addTrain">Add Train</button>
    </div>
    <table>
        <thead>
            <thead>
    <tr>
        <th>Train ID</th>
        <th>Name</th>
        <th>Route</th>
        <th>Total Seats</th>
        <th>Available</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
</thead>
        </thead>
        <tbody id="trainTable"></tbody>
    </table>
</section>

<div id="modal">
    <div class="modal-box">
        <h3 id="modalTitle">Add New</h3>
        <input type="text" id="input1" placeholder="Name">

        <input type="email" id="input2" placeholder="Email Address" 
       style="width: 90%; margin: 10px 0; border-radius: 30px; padding: 10px; border: 1px solid #ccc;">
        
        <input type="tel" id="inputPhone" 
       placeholder="Phone Number (10 digits)" 
       pattern="[0-9]{10}" 
       title="Please enter exactly 10 digits"
       style="display:none; width: 90%; margin: 10px 0; border-radius: 30px; padding: 10px; border: 1px solid #ccc;">
        
        <input type="number" id="inputSeats" placeholder="Total Seats" style="display:none; width: 90%; margin: 10px 0; border-radius: 30px; padding: 10px; border: 1px solid #ccc;">
        <input type="date" id="input3" style="display:none; width: 90%; margin: 10px 0; border-radius: 30px; padding: 10px; border: 1px solid #ccc;">
        
        <button id="saveBtn" style="width: 100%; margin-top: 10px;">Save</button>
        <button onclick="closeModal()" style="background:gray; width: 100%; margin-top: 5px;">Cancel</button>
    </div>
</div>

<script src="storage.js"></script>
<script>
    // 1. LOAD DATA ON START
    window.onload = function() {
        if (typeof loadAllData === "function") {
            loadAllData();
        }
    };
    const savedTab = localStorage.getItem("activeTab");
    const allTabs = document.querySelectorAll(".tab");
    const allContents = document.querySelectorAll(".content");

    if (savedTab) {
        // Remove active class from the default tab
        allTabs.forEach(t => t.classList.remove("active"));
        allContents.forEach(c => c.classList.remove("active"));

        // Activate the saved tab
        const targetButton = document.querySelector(`[data-tab="${savedTab}"]`);
        const targetContent = document.getElementById(savedTab);

        if (targetButton && targetContent) {
            targetButton.classList.add("active");
            targetContent.classList.add("active");
        }
    }

    const role = localStorage.getItem("role");
    document.getElementById("roleText").innerText = "Logged in as: " + (role || "Guest");

    // 2. LOGOUT (Fixed to not clear table data)
    document.getElementById("logoutBtn").onclick = function() {
        localStorage.removeItem("role"); 
        window.location.href = "login.html";
    }

    // 3. TABS LOGIC
    // Tabs Logic - Updated to save choice
const tabs = document.querySelectorAll(".tab");
const contents = document.querySelectorAll(".content");

tabs.forEach(tab => {
    tab.onclick = () => {
        const targetTab = tab.dataset.tab;

        // Remove active class from all
        tabs.forEach(t => t.classList.remove("active"));
        contents.forEach(c => c.classList.remove("active"));

        // Add active class to clicked tab
        tab.classList.add("active");
        document.getElementById(targetTab).classList.add("active");

        // SAVE the current tab name (e.g., "passengers")
        localStorage.setItem("activeTab", targetTab);
    }
});

    // 4. ROLE PERMISSIONS
    if(role === "staff") {
        document.getElementById("addPassenger").style.display = "none";
        document.getElementById("addTrain").style.display = "none";
    }

    // 5. MODAL LOGIC
    var currentTable = "";

  function openModal(type) {
    document.getElementById("modal").style.display = "flex";
    currentTable = type;
    document.getElementById("modalTitle").innerText = "Add " + type;
    
    // Reset inputs
    document.getElementById("input3").style.display = "none";
    document.getElementById("inputSeats").style.display = "none";
    document.getElementById("inputPhone").style.display = "none";

    if (type === "Passenger") {
        document.getElementById("input1").placeholder = "Passenger Name";

        document.getElementById("input2").placeholder = "Email Address";
        document.getElementById("input2").type = "email";

        document.getElementById("inputPhone").style.display = "inline-block";

    } 
    else if (type === "Train") {
        document.getElementById("input1").placeholder = "Train Name";

        document.getElementById("input2").placeholder = "Train Route";
        document.getElementById("input2").type = "text";

        document.getElementById("inputSeats").style.display = "inline-block";

    } 
    else if (type === "Reservation") {
        document.getElementById("input1").placeholder = "Passenger Name";

        document.getElementById("input2").placeholder = "Train Name";
        document.getElementById("input2").type = "text";

        document.getElementById("input3").style.display = "inline-block";
    }
}

  function closeModal() {
    // 1. Hide the main modal container
    document.getElementById("modal").style.display = "none";

    // 2. Clear all text/number/date values
    document.getElementById("input1").value = "";
    document.getElementById("input2").value = "";
    document.getElementById("input3").value = "";
    document.getElementById("inputSeats").value = "";
    document.getElementById("inputPhone").value = "";

    // 3. Reset all conditional display styles to 'none'
    // This ensures that when you open a different modal type, 
    // the previous type's fields are hidden.
    document.getElementById("input3").style.display = "none";
    document.getElementById("inputSeats").style.display = "none";
    document.getElementById("inputPhone").style.display = "none";
    
    // 4. (Optional) Clear any error messages that might be visible
    const errorMsg = document.getElementById("error");
    if (errorMsg) {
        errorMsg.innerText = "";
    }
}

    document.getElementById("saveBtn").onclick = function() {
    var val1 = document.getElementById("input1").value;
    var val2 = document.getElementById("input2").value;
    var valPhone = document.getElementById("inputPhone").value;

    // --- NEW VALIDATION FOR PASSENGER ---
    if (currentTable === "Passenger") {
        // This checks if the input is NOT exactly 10 digits
        const phonePattern = /^[0-9]{10}$/;
        if (!phonePattern.test(valPhone)) {
            alert("Error: Phone number must be exactly 10 digits.");
            return; // Stops the function here so no row is added
        }
        
    const valEmail = document.getElementById("input2").value;
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // Standard email check

    if (!emailPattern.test(valEmail)) {
        alert("Error: Please enter a valid email address (e.g., name@example.com).");
        return; // Stops the saving process
    }
}

    if (val1 && val2) {
        if (currentTable === "Reservation") {

    var trainRows = document.querySelectorAll("#trainTable tr");

    trainRows.forEach(row => {

        if (row.cells[1].innerText === val2) {

            var available = parseInt(row.cells[4].innerText);

            if (available === 0) {
                alert("Train is Full");
                return;
            }

            available--;

            row.cells[4].innerText = available;

            if (available === 0) {
                row.cells[5].innerText = "Full";
            }

        }

    });
}
        var tableId = currentTable.toLowerCase() + "Table";
        var table = document.getElementById(tableId);
        var row = table.insertRow();
        
        // ... rest of your existing logic to insert cells ...
        
        var prefix = currentTable === "Train" ? "TR-" : (currentTable === "Passenger" ? "P-" : "R-");
        row.insertCell(0).innerText = prefix + Math.floor(Math.random() * 100);
        row.insertCell(1).innerText = val1;
        row.insertCell(2).innerText = val2;
if (currentTable === "Train") {

    var seats = document.getElementById("inputSeats").value;

    row.insertCell(3).innerText = seats; // total seats
    row.insertCell(4).innerText = seats; // available seats

    var status = seats > 0 ? "Available" : "Full";

    row.insertCell(5).innerText = status;
}
        if (currentTable === "Passenger") {
            row.insertCell(3).innerText = valPhone; 
        } 
        

        var actionCell = row.insertCell(-1);
        actionCell.innerHTML =
"<button onclick='editRow(this)'>Edit</button> " +
"<button onclick='deleteRow(this)' style='background:red;'>Delete</button>";
        
        closeModal();
        saveAllData(); 
    }
}
    // 6. CONNECT BUTTONS
    document.getElementById("addTrain").onclick = function() { openModal("Train"); }
    document.getElementById("addPassenger").onclick = function() { openModal("Passenger"); }
    document.getElementById("addReservation").onclick = function() { openModal("Reservation"); }
function deleteRow(btn) {
    btn.parentElement.parentElement.remove();
    saveAllData();
}

function editRow(btn) {

    var row = btn.parentElement.parentElement;

    document.getElementById("input1").value = row.cells[1].innerText;
    document.getElementById("input2").value = row.cells[2].innerText;

    openModal("Train");

    row.remove();
}
</script>
</body>
</html>
