<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Reservation System - Admin</title>
    <script src="style.css"></script>
    <script>
        const userRole = localStorage.getItem("role");
        if (!userRole && !window.location.href.includes("login.html")) {
            window.location.href = "login.html";
        }
    </script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        .topbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 40px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logo img { width: 30px; height: 30px; border-radius: 50%; object-fit: contain; border: 2px solid #0b1c3f; }
        .tabs { display: flex; justify-content: center; margin: 20px; gap: 10px; }
        .tab { padding: 10px 20px; border: none; background: #ddd; border-radius: 20px; cursor: pointer; }
        .tab.active { background: #0b1c3f; color: white; }
        .content { display: none; width: 80%; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .content.active { display: block; }
        .sectionHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        button { background: #0b1c3f; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
       .modal-box input, 
.modal-box select { 
    width: 95%;           /* Ensures consistent width */
    margin: 10px 0; 
    border-radius: 30px; 
    padding: 12px;        /* Slightly more padding for better look */
    border: 1px solid #ccc; 
    box-sizing: border-box; /* Prevents padding from breaking width */
    font-size: 14px;
    /* If the table has more than one row, hide the first row if it's a 'no data' message */
}
    </style>
</head>
<body>

<header class="topbar">
    <div class="logo">
        <img src="images/f7dc4aac-6a9c-42e3-b3f6-56ec23995dcf-removebg-preview.png" alt="Logo">
        <div>
            <span style="display: block; font-weight: bold;">Train Reservation System</span>
            <p id="roleText" style="font-size: 12px; color: gray; margin: 0;"></p>
        </div>
    </div>
    <button id="logoutBtn">Logout</button>
</header>

<nav class="tabs">
    <button class="tab active" data-tab="reservations">Reservations</button>
    <button class="tab" data-tab="passengers">Passengers</button>
    <button class="tab" data-tab="trains">Trains</button>
</nav>

<section id="reservations" class="content active">
    <div class="sectionHeader">
        <h2>Reservations</h2>
        <button id="addReservation">Add Reservation</button>
    </div>
    <table>
        <thead><tr><th>ID</th><th>Passenger</th><th>Train</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="reservationTable"></tbody>
    </table>
</section>

<section id="passengers" class="content">
    <div class="sectionHeader">
        <h2>Passengers</h2>
        <button id="addPassenger">Add Passenger</button>
    </div>
    <table>
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Actions</th></tr></thead>
        <tbody id="passengerTable"></tbody>
    </table>
</section>

<section id="trains" class="content">
    <div class="sectionHeader">
        <h2>Train Management</h2>
        <button id="addTrain">Add Train</button>
    </div>
    <table>
        <thead><tr><th>ID</th><th>Name</th><th>Route</th><th>Seats</th><th>Available</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="trainTable"></tbody>
    </table>
</section>

<div id="modal">
    <div class="modal-box">
        <h3 id="modalTitle">Add New</h3>
        <input type="text" id="input1" placeholder="Name">
        <select id="passengerSelect" style="display:none;"></select>
        <input type="text" id="input2" placeholder="Detail">
        <select id="trainSelect" style="display:none;"></select>
        <input type="tel" id="inputPhone" placeholder="Phone" style="display:none;">
        <input type="number" id="inputSeats" placeholder="Total Seats" min="1" style="display:none;">
        <input type="date" id="input3" style="display:none;">
        <button id="saveBtn" style="width: 100%; margin-top: 10px;">Save</button>
        <button onclick="closeModal()" style="background:gray; width: 100%; margin-top: 5px;">Cancel</button>
    </div>
</div>

<script src="storage.js"></script>
<script>
    var currentTable = "";
    let editingRow = null;

    window.onload = function() {
        if (typeof loadAllData === "function") loadAllData();
        const role = localStorage.getItem("role");
        document.getElementById("roleText").innerText = "Logged in as: " + (role || "Guest");
        if(role === "staff") {
            document.getElementById("addPassenger").style.display = "none";
            document.getElementById("addTrain").style.display = "none";
        }
    };

    const tabs = document.querySelectorAll(".tab");
    tabs.forEach(tab => {
        tab.onclick = () => {
            tabs.forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
            tab.classList.add("active");
            document.getElementById(tab.dataset.tab).classList.add("active");
            localStorage.setItem("activeTab", tab.dataset.tab);
        };
    });

    function openModal(type) {
    document.getElementById("modal").style.display = "flex";
    currentTable = type;
    document.getElementById("modalTitle").innerText = "Add " + type;
    
    const ids = ["input1", "input2", "input3", "inputPhone", "inputSeats", "passengerSelect", "trainSelect"];
    ids.forEach(id => document.getElementById(id).style.display = "none");

    if (type === "Reservation") {
        populateDropdowns();
        
        // --- AUTOMATIC DATE LOGIC ---
        const today = new Date().toISOString().split('T')[0];
        document.getElementById("input3").value = today;
        
        document.getElementById("passengerSelect").style.display = "block";
        document.getElementById("trainSelect").style.display = "block";
        document.getElementById("input3").style.display = "block";
    } 
    else if (type === "Passenger") {
        document.getElementById("input1").style.display = "block";
        document.getElementById("input1").placeholder = "Name";
        document.getElementById("input2").style.display = "block";
        document.getElementById("input2").placeholder = "Email";
        document.getElementById("inputPhone").style.display = "block";
    } 
    else if (type === "Train") {
        document.getElementById("input1").style.display = "block";
        document.getElementById("input1").placeholder = "Train Name";
        document.getElementById("input2").style.display = "block";
        document.getElementById("input2").placeholder = "Route";
        document.getElementById("inputSeats").style.display = "block";
    }
}

    function closeModal() {
        document.getElementById("modal").style.display = "none";
        document.querySelectorAll(".modal-box input").forEach(i => i.value = "");
        editingRow = null;
    }

    document.getElementById("saveBtn").onclick = function() {
    let v1, v2; // Unique variables to prevent redeclaration errors
    const vPhone = document.getElementById("inputPhone").value;
    const vSeats = document.getElementById("inputSeats").value;
    const vDate = document.getElementById("input3").value;

    // 1. Get values based on current active Table
    if (currentTable === "Reservation") {
        v1 = document.getElementById("passengerSelect").value;
        v2 = document.getElementById("trainSelect").value;
    } else {
        v1 = document.getElementById("input1").value;
        v2 = document.getElementById("input2").value;
    }

    // 2. Validation: Ensure required fields aren't empty
    if (!v1 || !v2) {
        alert("Please fill in all required fields.");
        return;
    }

    // 3. Automated Seat Subtraction (Only for Reservations)
    if (currentTable === "Reservation") {
        let trainFound = false;
        document.querySelectorAll("#trainTable tr").forEach(row => {
            if (row.cells[1].innerText === v2) {
                trainFound = true;
                let available = parseInt(row.cells[4].innerText);
                if (available <= 0) {
                    alert("Error: This train is already full!");
                    return;
                }
                // Subtract seat and update Status
                row.cells[4].innerText = available - 1;
                if (available - 1 === 0) {
                    row.cells[5].innerText = "Full";
                }
            }
        });
    }

    // 4. Handle Editing: Remove the old row before adding the updated one
    if (editingRow) {
        editingRow.remove();
        editingRow = null;
    }

    // 5. Target the correct Table Body
    const tableId = currentTable.toLowerCase() + "Table";
    const table = document.getElementById(tableId);

    if (table.innerHTML.includes("No reservations yet")) {
        table.innerHTML = ""; 
    }

    // 6. Create the New Row
    const row = table.insertRow();
    const prefix = currentTable === "Train" ? "TR-" : (currentTable === "Passenger" ? "P-" : "R-");
    const uniqueID = prefix + Math.floor(Math.random() * 100);

    // 7. Insert Cells based on Table Structure
    row.insertCell(0).innerText = uniqueID; // Column 1: ID
    row.insertCell(1).innerText = v1;       // Column 2: Name/Passenger
    row.insertCell(2).innerText = v2;       // Column 3: Route/Train

    if (currentTable === "Train") {
        row.insertCell(3).innerText = vSeats; // Column 4: Total Seats
        row.insertCell(4).innerText = vSeats; // Column 5: Available
        row.insertCell(5).innerText = vSeats > 0 ? "Available" : "Full"; // Column 6: Status
    } 
    else if (currentTable === "Passenger") {
        row.insertCell(3).innerText = vPhone; // Column 4: Phone
    } 
    else if (currentTable === "Reservation") {
        row.insertCell(3).innerText = vDate;       // Column 4: Date (Automated)
        row.insertCell(4).innerText = "Confirmed"; // Column 5: Status
    }

    // 8. Add Actions (Edit/Delete buttons) to the last cell
    const actionCell = row.insertCell(-1);
    actionCell.innerHTML = `
    <button onclick="editRow(this)" style="background:#0b1c3f; margin-right:5px;">Edit</button> 
    <button onclick="deleteRow(this)" style="background:#cc0000;">Delete</button>
`;

    // 9. Cleanup and Save
    closeModal();
    if (typeof saveAllData === "function") {
        saveAllData(); // Ensure storage.js captures the new data
    }

    // Inside your saveBtn logic where seats reach 0
if (available - 1 === 0) {
    row.cells[5].innerText = "Full";
    row.cells[5].style.color = "red";
}
}


    // 1. Fixed Delete Function
function deleteRow(btn) {
    const row = btn.parentElement.parentElement;
    const tableId = row.parentElement.id;

    if (confirm("Are you sure you want to delete this?")) {
        
        // --- NEW REFUND LOGIC ---
        if (tableId === "reservationTable") {
            const trainName = row.cells[2].innerText; // Get the train name from the reservation row

            // Find the train in the Train Table and add the seat back
            document.querySelectorAll("#trainTable tr").forEach(trainRow => {
                if (trainRow.cells[1].innerText === trainName) {
                    let available = parseInt(trainRow.cells[4].innerText);
                    available++; // Give the seat back
                    
                    trainRow.cells[4].innerText = available;

                    // Update Status back to 'Available' if it was 'Full'
                    if (available > 0) {
                        trainRow.cells[5].innerText = "Available";
                        trainRow.cells[5].style.color = "green";
                    }
                }
            });
        }

        // Now remove the row and save
        row.remove();
        if (typeof saveAllData === "function") saveAllData();
    }
}

// 2. Fixed Edit Function (Matches your existing editingRow logic)
function editRow(btn) {
    editingRow = btn.parentElement.parentElement;
    const tableId = editingRow.parentElement.id;

    // Standard fields (Name/Passenger and Route/Train)
    document.getElementById("input1").value = editingRow.cells[1].innerText;
    document.getElementById("input2").value = editingRow.cells[2].innerText;

    if (tableId === "passengerTable") {
        document.getElementById("inputPhone").value = editingRow.cells[3].innerText;
        openModal("Passenger");
    } else if (tableId === "trainTable") {
        document.getElementById("inputSeats").value = editingRow.cells[3].innerText;
        openModal("Train");
    } else if (tableId === "reservationTable") {
        // For reservations, we use the dropdowns
        document.getElementById("passengerSelect").value = editingRow.cells[1].innerText;
        document.getElementById("trainSelect").value = editingRow.cells[2].innerText;
        document.getElementById("input3").value = editingRow.cells[3].innerText;
        openModal("Reservation");
    }
}

    function populateDropdowns() {
        const pSelect = document.getElementById("passengerSelect");
        const tSelect = document.getElementById("trainSelect");
        pSelect.innerHTML = '<option value="">-- Select Passenger --</option>';
        tSelect.innerHTML = '<option value="">-- Select Train --</option>';
        document.querySelectorAll("#passengerTable tr").forEach(row => {
            pSelect.innerHTML += `<option value="${row.cells[1].innerText}">${row.cells[1].innerText}</option>`;
        });
        document.querySelectorAll("#trainTable tr").forEach(row => {
            if (parseInt(row.cells[4].innerText) > 0) {
                tSelect.innerHTML += `<option value="${row.cells[1].innerText}">${row.cells[1].innerText}</option>`;
            }
        });
    }

    document.getElementById("addTrain").onclick = () => openModal("Train");
    document.getElementById("addPassenger").onclick = () => openModal("Passenger");
    document.getElementById("addReservation").onclick = () => openModal("Reservation");
    document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("role"); window.location.href = "login.html"; };
</script>
</body>
</html>
