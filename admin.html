<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Reservation System</title>

</head>

<body>

<header class="topbar">

<div class="logo">
🚆 Train Reservation System
<p id="roleText"></p>
</div>

<button id="logoutBtn">Logout</button>

</header>


<nav class="tabs">

<button class="tab active" data-tab="reservations">
Reservations
</button>

<button class="tab" data-tab="passengers">
Passengers
</button>

<button class="tab" data-tab="trains">
Trains
</button>

</nav>



<!-- Reservations -->

<section id="reservations" class="content active">

<div class="sectionHeader">
<h2>Reservations</h2>

<button id="addReservation">Add Reservation</button>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Passenger</th>
<th>Train</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="reservationTable">

<tr>
<td colspan="5">No reservations yet</td>
</tr>

</tbody>

</table>

</section>



<!-- Passengers -->

<section id="passengers" class="content">

<div class="sectionHeader">
<h2>Passengers</h2>

<button id="addPassenger">Add Passenger</button>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="passengerTable">

<tr>
<td colspan="4">No passengers added</td>
</tr>

</tbody>

</table>

</section>



<!-- Trains -->

<section id="trains" class="content">

<div class="sectionHeader">
<h2>Train Management</h2>

<button id="addTrain">Add Train</button>
</div>

<table>

<thead>

<tr>
<th>Train ID</th>
<th>Name</th>
<th>Route</th>
<th>Total Seats</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="trainTable">

<tr>
<td colspan="6">No trains added yet</td>
</tr>

</tbody>

</table>

</section>
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; padding:30px; border-radius:30px; width:300px; text-align:center;">
        <h3 id="modalTitle">Add New</h3>
       
        <input type="text" id="input1" placeholder="Name/Passenger" style="width:100%; margin:5px -8;border-radius: 30px; padding:10px;">
        <input type="text" id="input2" placeholder="Detail/Train" style="width:100%; margin:10px 0; padding:10px;">
        <input type="text" id="input3" placeholder="Date (YYYY-MM-DD)" style="display:none; width:100%; margin:10px 0; padding:10px;">
       
        <button id="saveBtn" style="background:#0b1c3f; color:white; width:100%; padding:10px; border:none; border-radius:5px;">Save</button>
        <button onclick="closeModal()" style="background:gray; color:white; width:100%; padding:10px; border:none; border-radius:5px; margin-top:5px;">Cancel</button>
    </div>
</div>

<style>body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:15px 40px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-size:20px;
font-weight:bold;
}

.tabs{
display:flex;
justify-content:center;
margin:20px;
gap:10px;
}

.tab{
padding:10px 20px;
border:none;
background:#ddd;
border-radius:20px;
cursor:pointer;
}

.tab.active{
background:#0b1c3f;
color:white;
}

.content{
display:none;
width:80%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.content.active{
display:block;
}

.sectionHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

button{
background:#0b1c3f;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}</style>
<script>const role = localStorage.getItem("role")

const roleText = document.getElementById("roleText")

roleText.innerText = "Logged in as: " + role



// logout

document.getElementById("logoutBtn").onclick = function(){

localStorage.clear()

window.location.href="login.html"

}



// Tabs

const tabs = document.querySelectorAll(".tab")

const contents = document.querySelectorAll(".content")

tabs.forEach(tab => {

tab.onclick = () => {

tabs.forEach(t=>t.classList.remove("active"))

contents.forEach(c=>c.classList.remove("active"))

tab.classList.add("active")

document.getElementById(tab.dataset.tab).classList.add("active")

}

})



// Role permissions

if(role === "staff"){

document.getElementById("addPassenger").style.display="none"

document.getElementById("addTrain").style.display="none"

}



// Demo add buttons

// Add Passenger with Pop-up
document.getElementById("addPassenger").onclick = function() {
    var name = prompt("Enter Passenger Name:");
    var email = prompt("Enter Email:");

    if (name && email) {
        var table = document.getElementById("passengerTable");
        var row = table.insertRow();
        row.insertCell(0).innerText = "P-" + Math.floor(Math.random() * 100);
        row.insertCell(1).innerText = name;
        row.insertCell(2).innerText = email;
        row.insertCell(3).innerHTML = "<button onclick='this.parentElement.parentElement.remove()'>Delete</button>";
    }
}
var currentTable = "";

// Open the Modal
function openModal(type) {
    document.getElementById("modal").style.display = "flex";
    currentTable = type;
    document.getElementById("modalTitle").innerText = "Add " + type;
}

// Close the Modal
var currentTable = "";

function openModal(type) {
    document.getElementById("modal").style.display = "flex";
    currentTable = type;
    document.getElementById("modalTitle").innerText = "Add " + type;

    // Show the 3rd input ONLY for Reservations
    if (type === "Reservation") {
        document.getElementById("input3").style.display = "block";
    } else {
        document.getElementById("input3").style.display = "none";
    }
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("input1").value = "";
    document.getElementById("input2").value = "";
    document.getElementById("input3").value = "";
}

document.getElementById("saveBtn").onclick = function() {
    var val1 = document.getElementById("input1").value;
    var val2 = document.getElementById("input2").value;
    var val3 = document.getElementById("input3").value;

    if (val1 && val2) {
        var table = document.getElementById(currentTable.toLowerCase() + "Table");
        var row = table.insertRow();

        // If it's a Reservation
        if (currentTable === "Reservation") {
            row.insertCell(0).innerText = "R-" + Math.floor(Math.random() * 100);
            row.insertCell(1).innerText = val1; // Passenger
            row.insertCell(2).innerText = val2; // Train
            row.insertCell(3).innerText = val3; // Date
            row.insertCell(4).innerHTML = "<button onclick='this.parentElement.parentElement.remove()' style='background:red; color:white;'>Delete</button>";
        }
        // If it's a Train
        else if (currentTable === "Train") {
            row.insertCell(0).innerText = "TR-" + Math.floor(Math.random() * 100);
            row.insertCell(1).innerText = val1;
            row.insertCell(2).innerText = val2;
            row.insertCell(3).innerText = "120";
            row.insertCell(4).innerText = "Active";
            row.insertCell(5).innerHTML = "<button onclick='this.parentElement.parentElement.remove()' style='background:red; color:white;'>Delete</button>";
        }
        // If it's a Passenger
        else {
            row.insertCell(0).innerText = "P-" + Math.floor(Math.random() * 100);
            row.insertCell(1).innerText = val1;
            row.insertCell(2).innerText = val2;
            row.insertCell(3).innerHTML = "<button onclick='this.parentElement.parentElement.remove()' style='background:red; color:white;'>Delete</button>";
        }
        closeModal();
    }
};

// Connect the buttons
document.getElementById("addTrain").onclick = function() { openModal("Train"); };
document.getElementById("addPassenger").onclick = function() { openModal("Passenger"); };
document.getElementById("addReservation").onclick = function() { openModal("Reservation"); };</script>
<script src="dashboard.js"></script>

</body>
</html>
