
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="style.css">

</head>
<script>

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e){

e.preventDefault();

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

const users = JSON.parse(localStorage.getItem("users")) || [];

const user = users.find(u => 
u.username === username && u.password === password
);

if(user){

localStorage.setItem("currentUser", JSON.stringify(user));
localStorage.setItem("role", user.role);

window.location.href = "dashboard.html";

}else{

document.getElementById("error").innerText="Invalid login";

}

});

</script>
<body>

<div class="login-container">

<div class="icon"><img src="images/f7dc4aac-6a9c-42e3-b3f6-56ec23995dcf-removebg-preview.png" alt="train logo"style="width: 80px; height: auto"></div>

<h2>Train Reservation System</h2>
<p class="subtitle">Sign in to manage reservations and passengers</p>

<form id="loginForm">

<label>UserID</label>
<input type="text" id="username" placeholder="Enter Your ID" required>

<label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>

<div class="role">
<p>Login as</p>

<label class="radio">
<input type="radio" name="role" checked>
Staff
</label>

<label class="radio">
<input type="radio" name="role">
Admin
</label>
</div>

<button type="submit">Sign In</button>
<p class="signup-link">
Don't have an account?
<a href="#" onclick="showSignup()">Sign Up</a>
</p>
<p id="error"></p>

</form>
<form id="signupForm" style="display:none;">
    <h3>Create Account</h3>

    <label>Username</label>
    <input type="text" id="newUsername" placeholder="Create a Username" required>

    <label>Password</label>
    <input type="password" id="newPassword" placeholder="Create a Password" required>

    <div class="role">
        <p>Register as</p>
        <label class="radio">
            <input type="radio" name="newRole" value="staff" checked>
            Staff
        </label>
        <label class="radio">
            <input type="radio" name="newRole" value="admin">
            Admin
        </label>
    </div>

    <button type="submit">Create Account</button>

    <p class="signup-link">
        Already have an account?
        <a href="#" onclick="showLogin()">Login</a>
    </p>
</form>


</div>
<script>
   
    
localStorage.setItem("currentUser", JSON.stringify(user));
function showSignup(){
document.getElementById("loginForm").style.display="none";
document.getElementById("signupForm").style.display="block";
}

function showLogin(){
document.getElementById("signupForm").style.display="none";
document.getElementById("loginForm").style.display="block";
}

</script>

<script src="users.js"></script>
<script src="auth.js"></script>

</body>
</html>
